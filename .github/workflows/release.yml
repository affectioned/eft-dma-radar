name: Build & Release

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Set version info
        id: version
        shell: pwsh
        run: |
          $sha   = "${{ github.sha }}".Substring(0, 7)
          $date  = Get-Date -Format "yyyy.MM.dd"
          $ver   = "$date.${{ github.run_number }}"
          $tag   = "build-$date-$sha"
          $zip   = "eft-dma-radar-$ver.zip"
          echo "VERSION=$ver"   >> $env:GITHUB_OUTPUT
          echo "TAG=$tag"       >> $env:GITHUB_OUTPUT
          echo "ZIP=$zip"       >> $env:GITHUB_OUTPUT

      - name: Publish
        shell: pwsh
        run: |
          dotnet publish src/eft-dma-radar.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishTrimmed=false `
            -p:VersionPrefix=${{ steps.version.outputs.VERSION }} `
            -o publish

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path publish\* -DestinationPath ${{ steps.version.outputs.ZIP }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "Build ${{ steps.version.outputs.VERSION }}"
          body: |
            Automated build from [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}).

            > **Required DLLs not included.** Place `vmm.dll`, `leechcore.dll`, and the other MemProcFS DLLs next to the exe before running. `makcu-cpp.dll` is also required if you want to use the hardware aimbot. See the [README](https://github.com/${{ github.repository }}/blob/main/README.md#required-dlls) for details.
          files: ${{ steps.version.outputs.ZIP }}
          draft: false
          prerelease: false
